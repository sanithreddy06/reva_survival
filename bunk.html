<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bunk Planner — REVA Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-tool" data-page="bunk">
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="particles" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="surveillance-bar"><span class="blink">●</span> SURVEILLANCE — <span id="session-id">REVA-????</span></div>

  <nav class="page-nav">
    <a href="index.html" class="nav-home"><span data-icon="home" class="nav-icon"></span> HOME</a>
    <span class="nav-divider">/</span>
    <span class="nav-current"><span data-icon="run" class="nav-icon"></span> Bunk Planner</span>
  </nav>

  <main class="page-main">
    <section class="card glass page-card">
      <div class="card-header">
        <span class="card-icon-wrap icon-cyan" data-icon="run"></span>
        <h1>Strategic Bunk Planner</h1>
        <span class="card-tag">TACTICAL</span>
      </div>
      <div class="card-body">
        <div class="input-grid cols-2">
          <label>Current Attendance % <input type="number" id="bunk-attendance" min="0" max="100" value="68" /></label>
          <label>Day of Week
            <select id="bunk-day">
              <option>Monday</option><option>Tuesday</option>
              <option selected>Wednesday</option><option>Thursday</option>
              <option>Friday</option><option>Saturday</option>
            </select>
          </label>
          <label>Subject Difficulty
            <select id="bunk-subject">
              <option value="easy">Easy (nobody cares)</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard (prof remembers faces)</option>
            </select>
          </label>
        </div>
        <button class="btn-neon" id="plan-bunk">CALCULATE ESCAPE ROUTE</button>
        <div class="results hidden" id="bunk-results">
          <p>Safest Bunk Day: <strong id="safest-day">Friday</strong></p>
          <p>Faculty Suspicion: <strong id="faculty-suspicion">MODERATE</strong></p>
          <p>Academic Danger Score: <strong id="academic-danger">42/100</strong></p>
          <p id="bunk-advice"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"><p><a href="index.html">← Back to Command Center</a></p></footer>
  <script src="js/icons.js"></script>
  <script src="js/core.js"></script>
  <script src="js/bunk.js"></script>
</body>
</html>
