<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Exam Panic Mode — REVA Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-tool page-panic" data-page="panic">
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="particles" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="surveillance-bar panic-bar"><span class="blink">●</span> EMERGENCY CHANNEL — <span id="session-id">REVA-????</span></div>

  <nav class="page-nav">
    <a href="index.html" class="nav-home"><span data-icon="home" class="nav-icon"></span> HOME</a>
    <span class="nav-divider">/</span>
    <span class="nav-current"><span data-icon="alert" class="nav-icon"></span> Exam Panic Mode</span>
  </nav>

  <main class="page-main">
    <section class="card glass page-card panic-card">
      <div class="card-header">
        <span class="card-icon-wrap icon-red" data-icon="alert"></span>
        <h1>Exam Panic Mode</h1>
        <span class="card-tag danger">DO NOT PRESS</span>
      </div>
      <div class="card-body center">
        <p class="warning-text">For academic emergencies only. Side effects include crying and 3am Wikipedia.</p>
        <button class="btn-panic" id="exam-panic-btn" type="button">
          <span class="panic-btn-text">EXAM TOMORROW</span>
          <span class="panic-btn-glow"></span>
        </button>
        <label class="sound-toggle">
          <input type="checkbox" id="sound-enabled" checked />
          Enable panic sounds (your neighbors will hate you)
        </label>
      </div>
    </section>
  </main>

  <footer class="footer"><p><a href="index.html">← Back to Command Center</a></p></footer>
  <script src="js/icons.js"></script>
  <script src="js/core.js"></script>
</body>
</html>
