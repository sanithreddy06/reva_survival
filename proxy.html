<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Proxy Simulator — REVA Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-tool" data-page="proxy">
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="particles" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="surveillance-bar"><span class="blink">●</span> SURVEILLANCE — <span id="session-id">REVA-????</span></div>

  <nav class="page-nav">
    <a href="index.html" class="nav-home"><span data-icon="home" class="nav-icon"></span> HOME</a>
    <span class="nav-divider">/</span>
    <span class="nav-current"><span data-icon="mask" class="nav-icon"></span> Proxy Simulator</span>
  </nav>

  <main class="page-main">
    <section class="card glass page-card">
      <div class="card-header">
        <span class="card-icon-wrap icon-cyan" data-icon="mask"></span>
        <h1>Proxy Attendance Simulator</h1>
        <span class="card-tag">STEALTH</span>
      </div>
      <div class="card-body">
        <p class="marks-info">Class strength fixed at <strong>65 students</strong> (REVA standard section).</p>
        <div class="slider-group">
          <label>Strict Teacher? <span id="val-strict">50%</span>
            <input type="range" id="strict-teacher" min="0" max="100" value="50" />
          </label>
          <label>Front Bench? <span id="val-front">30%</span>
            <input type="range" id="front-bench" min="0" max="100" value="30" />
          </label>
          <label>Friend Loyalty? <span id="val-loyalty">70%</span>
            <input type="range" id="friend-loyalty" min="0" max="100" value="70" />
          </label>
        </div>
        <button class="btn-neon" id="simulate-proxy">RUN STEALTH SIMULATION</button>
        <div class="results hidden" id="proxy-results">
          <div class="result-big" id="proxy-success">0%</div>
          <p id="proxy-risk"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"><p><a href="index.html">← Back to Command Center</a></p></footer>
  <script src="js/icons.js"></script>
  <script src="js/core.js"></script>
  <script src="js/proxy.js"></script>
</body>
</html>
