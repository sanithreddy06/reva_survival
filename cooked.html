<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>How Cooked Are You? — REVA Survival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-tool" data-page="cooked">
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="particles" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="surveillance-bar"><span class="blink">●</span> SURVEILLANCE — <span id="session-id">REVA-????</span></div>

  <nav class="page-nav">
    <a href="index.html" class="nav-home"><span data-icon="home" class="nav-icon"></span> HOME</a>
    <span class="nav-divider">/</span>
    <span class="nav-current"><span data-icon="flame" class="nav-icon"></span> How Cooked Are You?</span>
  </nav>

  <main class="page-main">
    <section class="card glass page-card">
      <div class="card-header">
        <span class="card-icon-wrap icon-hot" data-icon="flame"></span>
        <h1>How Cooked Are You?</h1>
        <span class="card-tag hot">THERMAL</span>
      </div>
      <div class="card-body">
        <div class="input-grid cols-2">
          <label>Attendance % <input type="number" id="cook-attendance" min="0" max="100" value="70" /></label>
          <label>Sleep (hrs/night) <input type="number" id="cook-sleep" min="0" max="24" step="0.5" value="4" /></label>
          <label>Assignments Pending <input type="number" id="cook-assignments" min="0" value="7" /></label>
          <label>Syllabus Done % <input type="number" id="cook-syllabus" min="0" max="100" value="23" /></label>
          <label>CGPA <input type="number" id="cook-cgpa" min="0" max="10" step="0.01" value="6.5" /></label>
        </div>
        <button class="btn-neon btn-purple" id="analyze-cooked">INITIATE THERMAL SCAN</button>
        <div class="results hidden" id="cooked-results">
          <div class="cooked-ring">
            <svg viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="52" />
              <circle class="ring-fill" id="cooked-ring" cx="60" cy="60" r="52" />
            </svg>
            <span class="ring-text" id="cooked-pct">0%</span>
          </div>
          <p class="diagnosis" id="cooked-diagnosis">Medium rare.</p>
          <p>Survival Probability: <strong id="survival-prob">0%</strong></p>
          <p class="ai-response" id="cooked-ai"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"><p><a href="index.html">← Back to Command Center</a></p></footer>
  <script src="js/icons.js"></script>
  <script src="js/core.js"></script>
  <script src="js/cooked.js"></script>
</body>
</html>
